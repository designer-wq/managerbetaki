  <style>
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #18181b;
    }

    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #bcd200;
    }

    /* Global Card Standard */
    .card-enterprise {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03), 0 6px 20px rgba(0, 0, 0, 0.35);
      transition: all 0.2s ease-in-out;
    }

    .card-enterprise:hover {
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04), 0 10px 30px rgba(0, 0, 0, 0.45);
      border-color: rgba(255, 255, 255, 0.08);
    }

    /* 1. Card Hierarchy */
    .card-primary {
      background: rgba(255, 255, 255, 0.035);
      /* Slightly lighter */
      border: 1px solid rgba(255, 255, 255, 0.08);
      /* Stronger border */
    }

    .card-secondary {
      background: rgba(255, 255, 255, 0.02);
      /* Standard */
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .card-neutral {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.02);
      /* Very subtle */
      box-shadow: none;
    }

    /* 2. Contrast Utilities */
    .text-contrast-title {
      opacity: 0.7;
    }

    .text-contrast-sub {
      opacity: 0.55;
    }

    .text-contrast-value {
      opacity: 1;
    }

    /* 3. Table Enhancements */
    .table-zebra tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.015);
    }

    .table-hover tr:hover {
      background: rgba(255, 255, 255, 0.035);
      cursor: pointer;
    }

    .table-content-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: #fff;
    }

    .table-content-id {
      font-size: 0.75rem;
      color: #71717a;
      opacity: 0.7;
    }

    /* Inputs/Filters radius-xs */
    input,
    select,
    textarea,
    .filter-container {
      border-radius: 6px !important;
    }

    /* Modals radius-lg */
    .modal-content {
      border-radius: 12px !important;
    }
  </style>
